  short_description: "Strict gated brand identity workflow with professional VI specification boards."
  default_prompt: "Use $brand-design-skill as a strict gated workflow. First ask Socratic brand/logo questions, then wait for my answers or explicit assumption approval. Do not generate images, final logo assets, or a VI manual until I approve each stage. After I select a logo candidate, treat that image as the locked source of truth: preserve its silhouette, negative space, proportions, and geometry while making final assets and professional VI specification boards with all required 21 chapters."
